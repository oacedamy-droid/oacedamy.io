backend:
  name: github
  repo: YOUR_USERNAME/oacedamy-droid
  branch: main

media_folder: "img"
public_folder: "/img"

collections:
  - name: "home"
    label: "Home Page"
    files:
      - file: "content/home.md"
        label: "Home Content"
        name: "home"
        fields:
          - { label: "Main Title", name: "title", widget: "string" }
          - { label: "Subtitle", name: "subtitle", widget: "text" }
